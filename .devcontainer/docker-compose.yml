version: "3.8"

services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:20
    working_dir: /workspace
    volumes:
      - ..:/workspace:cached
    command: /bin/sh -c "while sleep 1000; do :; done"
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: owcs_user
      DB_PASSWORD: owcs_password
      DB_NAME: owcs_db

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: owcs_db
      MYSQL_USER: owcs_user
      MYSQL_PASSWORD: owcs_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: